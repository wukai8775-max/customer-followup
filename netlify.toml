[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20"

[functions]
directory = "disabled-functions"
node_bundler = "esbuild"

[[redirects]]
from = "/api/*"
to = "/index.html"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
